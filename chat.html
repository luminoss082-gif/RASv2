<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat – LoveConnect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="js/app-init.js"></script>
    <script type="module" src="js/config.js"></script>
</head>

<body class="theme-light">

<header>
  <div class="logo">LoveConnect</div>
  <nav>
    <a href="home.html">Accueil</a>
    <a href="liste.html">Profils</a>
    <a href="premium.html">Premium</a>
    <a href="notifications.html">Notifications</a>
    <a href="support.html">Support</a>
    <a href="chat.html" class="active" id="chatLink">Chat</a>
    <a href="admin.html" id="adminLink">Admin</a>
    <button id="themeToggle" class="icon-btn">🌓</button>
  </nav>
</header>

<main class="chat-main">

  <!-- Liste des conversations -->
  <aside id="chatUsers" class="chat-users">
    <!-- Rempli automatiquement par app.js -->
  </aside>

  <!-- Fenêtre de chat -->
  <section class="chat-window">

    <div id="chatHeader" class="chat-header">
      <!-- Nom du match affiché ici -->
    </div>

    <div id="chatMessages" class="chat-messages">
      <!-- Messages affichés ici -->
    </div>

    <form id="chatForm" class="chat-form">
      <input type="text" id="chatInput" placeholder="Votre message...">
      <button class="btn primary" type="submit">Envoyer</button>
    </form>

  </section>

</main>

<!-- Notifications internes -->
<div id="notifBell" class="notif-bell">🔔</div>
<div id="notifPanel" class="notif-panel"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</body>
</html>
