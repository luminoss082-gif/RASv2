<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Créer mon profil – LoveConnect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="js/app-init.js"></script>
  <script type="module" src="js/config.js"></script>
</head>

<body class="theme-light">

<header>
  <div class="logo">LoveConnect</div>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="liste.html" class="active">Profils</a>
    <a href="premium.html">Premium</a>
    <a href="notifications.html">Notifications</a>
    <a href="support.html">Support</a>
    <a href="chat.html" id="chatLink">Chat</a>
    <a href="admin.html" id="adminLink">Admin</a>
    <button id="themeToggle" class="icon-btn">🌓</button>
  </nav>
</header>

<main class="section">

<form id="createProfileForm">

<div class="profile-container">
    <h2>Créer mon profil</h2>

        <p id="errorMsg" style="color:red; font-weight:bold;"></p>

        <label>Pseudo</label>
        <input type="text" name="pseudo" required> <br>

        <label>Âge</label>
        <input type="number" name="age" required> <br>

        <label>Ville</label>
        <input type="text" name="city" required> <br>
<br>
        <label>Genre</label>
        <select name="gender" required>
            <option value="">Sélectionner</option>
            <option value="Homme">Homme</option>
            <option value="Femme">Femme</option>
            <option value="Autre">Autre</option>
        </select>
<br>
        <label>Je recherche</label>
        <select name="looking_for" required>
            <option value="">Sélectionner</option>
            <option value="Homme">Homme</option>
            <option value="Femme">Femme</option>
            <option value="Autre">Autre</option>
        </select>
        <br>

        <label>Phrase d’accroche</label>
        <input type="text" name="tagline" maxlength="80">
<br>
        <label>Photo de profil</label>
        <br>
       <input type="file" id="avatar" name="avatar" accept="">
<img id="preview" src="" alt="">

        
<br>
        <button type="submit" class="btn-primary">Créer mon profil</button>
    </form>
</div>
</main>

</body>
</html>
