<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Créer mon profil – LoveConnect</title>
  <link rel="stylesheet" href="styles.css">
<meta name="theme-color" content="#d4af37">
</head>

<body class="theme-light page-profile-create">
<header>
  <div class="logo">LoveConnect</div>
  <nav aria-label="Navigation principale">
    <a href="index.html">Accueil</a>
    <a href="liste.html" class="active">Profils</a>
    <a href="notifications.html">Notifications</a>
    <a href="support.html">Support</a>
    <a href="chat.html" id="chatLink">Chat</a>
    <a href="settings.html">Paramètres</a>
    <a href="admin.html" id="adminLink">Admin</a>
    <button id="themeToggle" class="icon-btn" type="button" aria-label="Changer le thème">🌓</button>
  </nav>
</header>

<main class="section">
  <section class="profile-container" aria-labelledby="createProfileTitle">
    <div class="page-intro">
      <p class="subtitle">Complète ton profil pour commencer à rencontrer des personnes compatibles.</p>
      <h1 id="createProfileTitle">Créer mon profil</h1>
    </div>

    <form id="createProfileForm" class="card-form">
      <p id="errorMsg" class="error-msg" role="alert"></p>

      <label for="pseudo">Pseudo</label>
      <input id="pseudo" type="text" name="pseudo" placeholder="Ex : Alex" autocomplete="nickname" required>

      <label for="age">Âge</label>
      <input id="age" type="number" name="age" min="18" max="120" placeholder="Ex : 28" required>

      <label for="city">Ville</label>
      <input id="city" type="text" name="city" placeholder="Ex : Paris" autocomplete="address-level2" required>

      <label for="gender">Genre</label>
      <select id="gender" name="gender" required>
        <option value="">Sélectionner</option>
        <option value="Homme">Homme</option>
        <option value="Femme">Femme</option>
        <option value="Autre">Autre</option>
      </select>

      <label for="looking_for">Je recherche</label>
      <select id="looking_for" name="looking_for" required>
        <option value="">Sélectionner</option>
        <option value="Homme">Homme</option>
        <option value="Femme">Femme</option>
        <option value="Autre">Autre</option>
      </select>

      <label for="tagline">Phrase d’accroche</label>
      <input id="tagline" type="text" name="tagline" maxlength="80" placeholder="Une phrase qui te représente">

      <label for="avatar">Photo de profil</label>
     <input type="file" id="avatar" name="avatar"  accept="image/*">
      <img id="preview">

      <button type="submit" class="btn primary full btn-primary">Créer mon profil</button>
    </form>
  </section>
  <!-- NAVIGATION MOBILE -->

<nav class="mobile-nav">

  <a href="index.html">
    <span>🏠</span>
    <small>Accueil</small>
  </a>

  <a href="liste.html">
    <span>❤️</span>
    <small>Profils</small>
  </a>

  <a href="chat.html">
    <span>💬</span>
    <small>Chat</small>
  </a>

  <a href="notifications.html">
    <span>🔔</span>
    <small>Notif</small>
  </a>

  <a href="settings.html">
    <span>⚙️</span>
    <small>Compte</small>
  </a>

</nav>

<!-- BOUTON RETOUR -->

<button
  id="scrollTopBtn"
  class="scroll-top-btn"
  type="button"
>
  ↑
</button>
</main>

<div id="notifBell" class="notif-bell">🔔</div>
<div id="notifPanel" class="notif-panel"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="js/app-init.js"></script>
</body>
</html>
