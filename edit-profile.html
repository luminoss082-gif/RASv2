<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Modifier mon profil – LoveConnect</title>
  <link rel="stylesheet" href="styles.css">
<meta name="theme-color" content="#d4af37">
</head>

<body class="theme-light page-profile-edit">
<header>
  <div class="logo">LoveConnect</div>
  <nav aria-label="Navigation principale">
    <a href="index.html">Accueil</a>
    <a href="liste.html" class="active">Profils</a>
    <a href="notifications.html">Notifications</a>
    <a href="support.html">Support</a>
    <a href="chat.html" id="chatLink">Chat</a>
    <a href="settings.html">Paramètres</a>
    <a href="admin.html" id="adminLink">Admin</a>
    <button id="themeToggle" class="icon-btn" type="button" aria-label="Changer le thème">🌓</button>
  </nav>
</header>

<main class="section">
  <section class="profile-container" aria-labelledby="editProfileTitle">
    <div class="page-intro">
      <p class="subtitle">Mets à jour tes informations et ajoute des photos pour enrichir ton profil.</p>
      <h1 id="editProfileTitle">Modifier mon profil</h1>
    </div>

    <form id="editProfileForm" enctype="multipart/form-data" class="card-form">
      <label for="editPseudo">Pseudo</label>
      <input type="text" id="editPseudo" name="pseudo" placeholder="Pseudo">

      <label for="editAge">Âge</label>
      <input type="number" id="editAge" name="age" min="18" max="120" placeholder="Âge">

      <label for="editCity">Ville</label>
      <input type="text" id="editCity" name="city" placeholder="Ville">

      <label for="editGender">Genre</label>
      <select id="editGender" name="gender">
        <option value="">Genre</option>
        <option value="H">Homme</option>
        <option value="F">Femme</option>
        <option value="Autre">Autre</option>
      </select>

      <label for="editLookingFor">Je recherche</label>
      <select id="editLookingFor" name="looking_for">
        <option value="">Choisir</option>
        <option value="H">Homme</option>
        <option value="F">Femme</option>
        <option value="Autre">Autre</option>
      </select>

      <label for="editTagline">Phrase d’accroche</label>
      <input type="text" id="editTagline" name="tagline" maxlength="80" placeholder="Phrase d’accroche">

      <section class="photo-manager" aria-labelledby="photosTitle">
        <h2 id="photosTitle">Mes photos</h2>
        <p class="subtitle">Ajoute plusieurs photos pour montrer ton univers.</p>

        <div id="photoUploadArea" class="photo-upload-area">
          <input type="file" id="photoInput" accept="image/*" multiple>
          <button class="btn primary full" id="uploadPhotosBtn" type="button">Ajouter des photos</button>
        </div>

        <div id="photoGallery" class="photo-gallery"></div>
      </section>

      <button class="btn primary full" type="submit">Enregistrer les modifications</button>
    </form>
  </section>
  <!-- NAVIGATION MOBILE -->

<nav class="mobile-nav">

  <a href="index.html">
    <span>🏠</span>
    <small>Accueil</small>
  </a>

  <a href="liste.html">
    <span>❤️</span>
    <small>Profils</small>
  </a>

  <a href="chat.html">
    <span>💬</span>
    <small>Chat</small>
  </a>

  <a href="notifications.html">
    <span>🔔</span>
    <small>Notif</small>
  </a>

  <a href="settings.html">
    <span>⚙️</span>
    <small>Compte</small>
  </a>

</nav>

<!-- BOUTON RETOUR -->

<button
  id="scrollTopBtn"
  class="scroll-top-btn"
  type="button"
>
  ↑
</button>
</main>

<div id="notifBell" class="notif-bell">🔔</div>
<div id="notifPanel" class="notif-panel"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="js/app-init.js"></script>
</body>
</html>
