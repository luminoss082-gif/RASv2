<!DOCTYPE html>
<html lang="fr">

</head>
<body class="theme-light">

<header>
  <div class="logo">LoveConnect</div>
  <nav>
    <a href="hindex.html">Accueil</a>
    <a href="liste.html" class="active">Profils</a>

  </nav>
</header>

<main class="section">
  <h1>Modifier mon profil</h1>
    
  <form id="editProfileForm" enctype="multipart/form-data" class="card-form">

    <label>Pseudo</label>
    <input type="text" id="editPseudo" name="pseudo" placeholder="Pseudo">

    <label>Âge</label>
    <input type="number" id="editAge" name="age" placeholder="Âge">

    <label>Ville</label>
    <input type="text" id="editCity" name="city" placeholder="Ville">

    <label>Genre</label>
    <select id="editGender" name="gender">
      <option value="">Genre</option>
      <option value="H">Homme</option>
      <option value="F">Femme</option>
      <option value="Autre">Autre</option>
    </select>

    <label>Je recherche</label>
    <select id="editLookingFor" name="looking_for">
      <option value="">Choisir</option>
      <option value="H">Homme</option>
      <option value="F">Femme</option>
      <option value="Autre">Autre</option>
    </select>

    <label>Phrase d’accroche</label>
    <input type="text" id="editTagline" name="tagline" placeholder="Phrase d’accroche">

    <label>Nouvel avatar (optionnel)</label>
   <h3>Mes photos</h3>

<div id="photoUploadArea" class="photo-upload-area">
  <input type="file" id="photoInput" accept="image/*" multiple>
  <button class="btn primary full" id="uploadPhotosBtn">Ajouter des photos</button>
</div>

<div id="photoGallery" class="photo-gallery"></div>

    <button class="btn primary full" type="submit">Enregistrer</button>
  </form>
