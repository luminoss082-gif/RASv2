<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Support – LoveConnect</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="theme-light page-support">
<header>
  <div class="logo">LoveConnect</div>
  <nav aria-label="Navigation principale">
    <a href="index.html">Accueil</a>
    <a href="liste.html">Profils</a>
    <a href="premium.html">Premium</a>
    <a href="notifications.html">Notifications</a>
    <a href="support.html" class="active">Support</a>
    <a href="chat.html" id="chatLink">Chat</a>
    <a href="admin.html" id="adminLink">Admin</a>
    <button id="themeToggle" class="icon-btn" type="button" aria-label="Changer le thème">🌓</button>
  </nav>
</header>

<main class="section support-layout-user">
  <section class="page-intro">
    <p class="subtitle">Besoin d’aide ? Ouvre un ticket et discute directement avec l’équipe.</p>
    <h1>Support & Aide</h1>
  </section>

  <section class="support-grid">
    <aside class="ticket-new card-form" aria-labelledby="newTicketTitle">
      <form id="createTicketForm">
        <h2 id="newTicketTitle">Créer un ticket</h2>

        <label for="ticketCategory">Catégorie</label>
        <select id="ticketCategory" required>
          <option value="">Catégorie</option>
          <option value="bug">🐞 Bug</option>
          <option value="signalement">🚨 Signalement</option>
          <option value="demande">❓ Demande</option>
          <option value="autre">📄 Autre</option>
        </select>

        <label for="ticketSubject">Sujet</label>
        <input type="text" id="ticketSubject" placeholder="Sujet du ticket" required>

        <button class="btn primary full" type="submit">Créer le ticket</button>
      </form>

      <hr>

      <h2>Mes tickets</h2>
      <div id="ticketsList" class="tickets-list"></div>
    </aside>

    <section id="ticketChatSection" class="ticket-chat hidden" aria-labelledby="ticketTitle">
      <h2 id="ticketTitle">Ticket</h2>
      <div id="ticketMessages" class="ticket-messages"></div>

      <form id="ticketMessageForm" class="ticket-message-form">
        <label for="ticketMessageInput">Message</label>
        <textarea id="ticketMessageInput" placeholder="Votre message..." required></textarea>

        <label class="file-upload" for="ticketAttachment">📎 Pièce jointe</label>
        <input type="file" id="ticketAttachment">

        <button class="btn primary full" type="submit">Envoyer</button>
      </form>
    </section>
  </section>
</main>

<div id="notifBell" class="notif-bell">🔔</div>
<div id="notifPanel" class="notif-panel"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="js/app-init.js"></script>
</body>
</html>
