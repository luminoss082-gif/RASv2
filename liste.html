<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Profils – LoveConnect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
<script type="module" src="js/config.js"></script>
<script type="module" src="js/app-init.js"></script>
<script type="module" src="js/theme.js"></script>
</head>

<body class="theme-light">

<header>
  <div class="logo">LoveConnect</div>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="liste.html" class="active">Profils</a>
    <a href="premium.html">Premium</a>
    <a href="notifications.html">Notifications</a>
    <a href="support.html">Support</a>
    <a href="chat.html" id="chatLink">Chat</a>
    <a href="admin.html" id="adminLink">Admin</a>
    <button id="themeToggle" class="icon-btn">🌓</button>
  </nav>
</header>

<main class="section">

  <!-- Mon profil résumé -->
  <section id="myProfileCard" class="my-profile-card"></section>

  <!-- Matching automatique -->
  <section id="matchBox" class="match-box hidden"></section>

  <!-- Stories -->
  <section id="storiesBar" class="stories-bar"></section>
  <button id="addStoryBtn" class="btn ghost small">Ajouter une story</button>

  <!-- Filtres -->
  <form id="filtersForm" class="filters">
    <input type="text" id="searchInput" placeholder="Rechercher un pseudo ou une phrase...">
    <input type="number" id="ageMin" placeholder="Âge min">
    <input type="number" id="ageMax" placeholder="Âge max">
    <input type="text" id="cityFilter" placeholder="Ville">
    <select id="genderFilter">
      <option value="">Genre</option>
      <option value="H">Homme</option>
      <option value="F">Femme</option>
      <option value="Autre">Autre</option>
    </select>
    <label>
      <input type="checkbox" id="favoritesOnly"> Favoris uniquement
    </label>
  </form>

  <!-- Liste des profils -->
  <div id="profilesList" class="profiles-list"></div>

</main>

<!-- Notifications internes -->
<div id="notifBell" class="notif-bell">🔔</div>
<div id="notifPanel" class="notif-panel"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


</body>
</html>
