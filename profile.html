<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Profil – LoveConnect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Consultez un profil LoveConnect, ses photos, stories et informations.">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="theme-light profile-page">

<header>
  <div class="logo">LoveConnect</div>

  <nav aria-label="Navigation principale">
    <a href="index.html">Accueil</a>
    <a href="liste.html" class="active">Profils</a>
    <a href="premium.html">Premium</a>
    <a href="notifications.html">Notifications</a>
    <a href="support.html">Support</a>
    <a href="chat.html" id="chatLink">Chat</a>
    <a href="admin.html" id="adminLink">Admin</a>
    <button id="themeToggle" class="icon-btn" type="button" aria-label="Changer le thème">🌓</button>
  </nav>
</header>

<main class="section profile-layout">

  <section class="profile-header-card">
    <div>
      <a href="liste.html" class="back-link">← Retour aux profils</a>
      <h1>Profil</h1>
      <p class="subtitle">Découvrez ses informations, ses photos et ses stories.</p>
    </div>
  </section>

  <!-- Stories du profil -->
  <section class="profile-section" aria-labelledby="storiesTitle">
    <h2 id="storiesTitle">Stories</h2>
    <div id="storiesBar" class="stories-bar">
      <!-- Rempli automatiquement par app-init.js -->
    </div>
  </section>

  <section id="profileDetail" class="profile-detail profile-card-large">
    <!-- Infos profil remplies automatiquement par app-init.js -->

    <!-- Carrousel multi-photos -->
    <div class="carousel" id="profileCarousel" aria-label="Photos du profil">
      <button class="carousel-btn left" id="carouselPrev" type="button" aria-label="Photo précédente">‹</button>

      <div class="carousel-main">
        <img id="carouselMainImage" src="" alt="Photo principale du profil" loading="lazy">
      </div>

      <button class="carousel-btn right" id="carouselNext" type="button" aria-label="Photo suivante">›</button>
    </div>

    <!-- Miniatures -->
    <div class="carousel-thumbs" id="carouselThumbs" aria-label="Miniatures des photos">
      <!-- Miniatures générées automatiquement par app-init.js -->
    </div>
  </section>

</main>

<!-- Notifications internes -->
<div id="notifBell" class="notif-bell" role="button" tabindex="0" aria-label="Notifications">🔔</div>
<div id="notifPanel" class="notif-panel" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="js/app-init.js"></script>

</body>
</html>
