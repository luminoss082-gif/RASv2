<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Profil – LoveConnect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="js/app-init.js"></script>
  <script type="module" src="js/config.js"></script>

</head>

<body class="theme-light">

<header>
  <div class="logo">LoveConnect</div>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="liste.html" class="active">Profils</a>
    <a href="premium.html">Premium</a>
    <a href="notifications.html">Notifications</a>
    <a href="support.html">Support</a>
    <a href="chat.html" id="chatLink">Chat</a>
    <a href="admin.html" id="adminLink">Admin</a>
    <button id="themeToggle" class="icon-btn">🌓</button>
  </nav>
</header>

<main class="section">

  <!-- Stories du profil -->
  <div id="storiesBar" class="stories-bar">
    <!-- Rempli par app.js -->
  </div>

  <div id="profileDetail" class="profile-detail">
    <!-- Infos profil remplies par app.js -->

    <!-- Carrousel multi-photos -->
    <div class="carousel" id="profileCarousel">
      <button class="carousel-btn left" id="carouselPrev">‹</button>

      <div class="carousel-main">
        <img id="carouselMainImage" src="" alt="Photo principale" />
      </div>

      <button class="carousel-btn right" id="carouselNext">›</button>
    </div>

    <!-- Miniatures + drag & drop + choix photo principale -->
    <div class="carousel-thumbs" id="carouselThumbs">
      <!-- Thumbs générées par app.js -->
    </div>
  </div>



</main>


<!-- Notifications internes -->
<div id="notifBell" class="notif-bell">🔔</div>
<div id="notifPanel" class="notif-panel"></div>

</body>
</html>
